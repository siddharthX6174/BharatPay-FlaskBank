<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Receipt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            padding: 40px 20px;
            color: #111827;
        }

        .receipt {
            max-width: 440px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(6, 78, 59, 0.08);
            overflow: hidden;
            border: 1px solid #ecfdf5;
        }

        .header {
            background-color: #065f46;
            color: white;
            padding: 48px 32px;
            text-align: center;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.05), transparent);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -0.025em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.6;
        }

        .success-icon {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .content {
            padding: 40px 32px;
        }

        .status {
            text-align: center;
            margin-bottom: 32px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background-color: #ecfdf5;
            color: #065f46;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid #d1fae5;
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 8px;
        }

        .details {
            border-top: 1px dashed #e5e7eb;
            padding-top: 32px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 14px 0;
        }

        .detail-label {
            color: #6b7280;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .detail-value {
            color: #111827;
            font-size: 14px;
            font-weight: 700;
            text-align: right;
            max-width: 60%;
        }

        .amount-row {
            margin-top: 16px;
            padding: 24px 0;
            border-top: 2px solid #111827;
        }

        .amount-row .detail-label {
            color: #111827;
            font-size: 12px;
        }

        .amount-row .detail-value {
            font-size: 28px;
            color: #065f46;
            font-weight: 900;
            letter-spacing: -0.05em;
        }

        .footer {
            text-align: center;
            padding: 32px;
            background-color: #f9fafb;
            border-top: 1px solid #f3f4f6;
        }

        .footer p {
            font-size: 10px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .footer .bank-name {
            font-size: 14px;
            font-weight: 900;
            color: #111827;
            letter-spacing: -0.025em;
        }
    </style>
</head>

<body>
    <div class="receipt">
        <div class="header">
            <div class="success-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h1>Verified</h1>
            <p>Protocol Transmission Ledger</p>
        </div>

        <div class="content">
            <div class="status">
                <span class="status-badge">Committed</span>
            </div>

            <div class="details">
                <div class="detail-row">
                    <span class="detail-label">Origin node</span>
                    <span class="detail-value">{sender_name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Target node</span>
                    <span class="detail-value">{recipient_name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Identifier</span>
                    <span class="detail-value"
                        style="font-family: monospace; letter-spacing: -1px;">{recipient_card_number}</span>
                </div>
                <div class="detail-row amount-row">
                    <span class="detail-label">Total Volume</span>
                    <span class="detail-value">₹ {amount:.2f}</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Cryptographic proof verified by</p>
            <p class="bank-name">BHARAT PAY BANK CORE</p>
        </div>
    </div>
</body>

</html>
