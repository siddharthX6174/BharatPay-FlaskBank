<div class="min-h-screen bg-gray-50 py-12 flex items-center justify-center">
    <div class="max-w-lg w-full px-4">
        <!-- Coming Soon Card -->
        <div
            class="bg-white rounded-[3rem] shadow-2xl shadow-emerald-900/10 border border-emerald-100 overflow-hidden transform hover:scale-[1.01] transition-transform duration-500">
            <!-- Header -->
            <div class="bg-gray-900 py-12 text-center relative overflow-hidden">
                <div class="absolute inset-0 bg-emerald-600 opacity-10 blur-3xl rounded-full -top-1/2 -left-1/2"></div>
                <div class="relative z-10">
                    <div
                        class="w-16 h-16 bg-emerald-500/20 text-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-6 backdrop-blur-sm border border-emerald-500/20">
                        <i class="fas fa-hourglass-half text-2xl"></i>
                    </div>
                    <h1 class="text-3xl font-black text-white tracking-tight italic">Protocol: Pending</h1>
                    <p class="text-emerald-400/80 text-[10px] font-black uppercase tracking-[0.3em] mt-3">Expansion
                        module under development</p>
                </div>
            </div>

            <!-- Countdown -->
            <div class="p-10">
                <div class="grid grid-cols-4 gap-4 mb-10">
                    <div class="text-center bg-gray-50 border border-gray-100 rounded-2xl p-4">
                        <div id="days" class="text-2xl font-black text-emerald-600 tracking-tighter">00</div>
                        <div class="text-[8px] font-black text-gray-400 uppercase tracking-widest mt-1">Days</div>
                    </div>
                    <div class="text-center bg-gray-50 border border-gray-100 rounded-2xl p-4">
                        <div id="hours" class="text-2xl font-black text-emerald-600 tracking-tighter">00</div>
                        <div class="text-[8px] font-black text-gray-400 uppercase tracking-widest mt-1">Hours</div>
                    </div>
                    <div class="text-center bg-gray-50 border border-gray-100 rounded-2xl p-4">
                        <div id="minutes" class="text-2xl font-black text-emerald-600 tracking-tighter">00</div>
                        <div class="text-[8px] font-black text-gray-400 uppercase tracking-widest mt-1">Mins</div>
                    </div>
                    <div class="text-center bg-gray-50 border border-gray-100 rounded-2xl p-4">
                        <div id="seconds" class="text-2xl font-black text-emerald-600 tracking-tighter">00</div>
                        <div class="text-[8px] font-black text-gray-400 uppercase tracking-widest mt-1">Secs</div>
                    </div>
                </div>

                <!-- Subscribe Form -->
                <div class="border-t border-gray-100 pt-8">
                    <h2 class="text-xs font-black text-gray-900 uppercase tracking-widest mb-2">Initialize Alert</h2>
                    <p class="text-xs font-medium text-gray-500 mb-6 leading-relaxed">Subscribe to receive a priority
                        transmission upon module activation.</p>

                    <form class="flex gap-3">
                        <input type="email" placeholder="node@protocol.audit"
                            class="flex-1 px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:bg-white focus:border-emerald-500 transition-all outline-none font-bold text-gray-900 text-sm">
                        <button type="button"
                            class="px-6 py-4 bg-emerald-600 text-white text-[10px] font-black uppercase tracking-widest rounded-2xl hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-600/20 active:scale-95">
                            Sync
                        </button>
                    </form>
                </div>
            </div>

            <!-- Footer -->
            <div class="px-10 py-6 bg-gray-50/50 border-t border-gray-100">
                <a href="{{ url_for('dashboard') }}"
                    class="group flex items-center justify-center text-[10px] font-black text-gray-400 hover:text-emerald-600 uppercase tracking-widest transition-all">
                    <i class="fas fa-arrow-left mr-3 transform group-hover:-translate-x-1 transition-transform"></i>
                    Back to Core Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    // Calculate a date 30 days from now
    let comingDate = new Date();
    comingDate.setDate(comingDate.getDate() + 30);

    let d = document.getElementById('days');
    let h = document.getElementById('hours');
    let m = document.getElementById('minutes');
    let s = document.getElementById('seconds');

    let x = setInterval(function () {
        let now = new Date();
        let selisih = comingDate.getTime() - now.getTime();

        let days = Math.floor(selisih / (1000 * 60 * 60 * 24));
        let hours = Math.floor(selisih % (1000 * 60 * 60 * 24) / (1000 * 60 * 60));
        let minutes = Math.floor(selisih % (1000 * 60 * 60) / (1000 * 60));
        let seconds = Math.floor(selisih % (1000 * 60) / 1000);

        if (d) d.innerHTML = getTrueNumber(days);
        if (h) h.innerHTML = getTrueNumber(hours);
        if (m) m.innerHTML = getTrueNumber(minutes);
        if (s) s.innerHTML = getTrueNumber(seconds);

        if (selisih < 0) {
            clearInterval(x);
            if (d) d.innerHTML = '00';
            if (h) h.innerHTML = '00';
            if (m) m.innerHTML = '00';
            if (s) s.innerHTML = '00';
        }
    }, 1000);

    function getTrueNumber(x) {
        if (x < 10) return '0' + x;
        else return x;
    }
</script>
{% endblock %}
